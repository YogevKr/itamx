name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --locked --extra mcp

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run python -m unittest discover -s tests

      - name: Compile
        run: uv run python -m compileall -q src tests

      - name: Build
        run: uv build

      - name: Wheel smoke test
        run: |
          tmp_dir="$(mktemp -d)"
          uv venv "$tmp_dir/venv"
          wheel="$(ls dist/itamx-*.whl)"
          uv pip install --python "$tmp_dir/venv/bin/python" "${wheel}[mcp]"
          "$tmp_dir/venv/bin/itamx" mcp-config >/dev/null
          "$tmp_dir/venv/bin/python" - <<'PY'
          import asyncio
          from itamx.mcp.server import mcp

          async def main():
              tools = [tool.name for tool in await mcp.list_tools()]
              assert tools == [
                  "search_flights",
                  "show_flight_details",
                  "search_dates",
                  "search_locations",
                  "search_airlines",
              ]

          asyncio.run(main())
          PY
